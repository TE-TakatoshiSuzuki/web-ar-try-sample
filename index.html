<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Web AR Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* 背景ラッパー */
    #background {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    /* 動画・静止画は「背景」として扱う */
    #camera,
    #stillImage {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }

    /* 静止画は初期非表示 */
    #stillImage {
      display: none;
    }

    /* 刺繍デザイン */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 150px;
      touch-action: none;
      cursor: move;
      z-index: 10
    }

    /* UI */
    #controls {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 20;
      display: flex;
      gap: 8px;
    }

    #note {
      position: fixed;
      bottom: 8px;
      left: 50%;
      z-index: 20;
      font-size: 12px;
      color: #fff;
      background: rgba(0,0,0,0.4);
      padding: 4px 8px;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <!-- 背景レイヤー -->
  <div id="background">
    <video id="camera" autoplay playsinline muted></video>
    <img id="stillImage" />
  </div>


  <!-- 刺繍デザイン -->
  <img id="overlay" src="img/design.png" />

  <!-- 操作UI -->
  <div id="controls">
    <button id="videoModeBtn">動画モード</button>
    <button id="stillModeBtn">静止画モード</button>
  </div>

  <div id="note">
    ※ 完成イメージです。スクリーンショットで保存してください。
  </div>

  <script src="js/app.js"></script>
</body>
</html>
