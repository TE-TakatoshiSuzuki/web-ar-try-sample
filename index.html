<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Web AR Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #camera,
    #stillImage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
    }

    #stillImage {
      display: none;
    }

    #overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 150px;
      transform: translate(-50%, -50%);
      touch-action: none;
      cursor: move;
      z-index: 10;
    }

    #controls {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 20;
      display: flex;
      gap: 8px;
    }

    button {
      padding: 6px 10px;
      font-size: 14px;
    }

    #note {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #fff;
      opacity: 0.7;
      background: rgba(0,0,0,0.4);
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 20;
    }
  </style>
</head>

<body>
  <!-- 動画 -->
  <video id="camera" autoplay playsinline muted></video>

  <!-- 静止画 -->
  <img id="stillImage" />

  <!-- 刺繍デザイン -->
  <img id="overlay" src="img/design.png" />

  <!-- 操作UI -->
  <div id="controls">
    <button id="videoModeBtn">動画モード</button>
    <button id="stillModeBtn">静止画モード</button>
  </div>

  <div id="note">
    ※ 完成イメージです。スクリーンショットで保存してください。
  </div>

  <script src="js/app.js"></script>
</body>
</html>
