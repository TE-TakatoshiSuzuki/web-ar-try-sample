<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>刺繍プレビュー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 24px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-primary {
      background: #1e90ff;
      color: #fff;
    }

    .btn-disabled {
      background: #444;
      color: #aaa;
      cursor: not-allowed;
    }

    .note {
      margin-top: 12px;
      font-size: 12px;
      color: #aaa;
    }

  </style>
</head>

<body>
  <div class="container">
    <h1>タイプを選択してください</h1>

    <!-- 準備中 -->
    <button class="btn btn-disabled" disabled>
      ボタン（準備中）
    </button>

    <!-- ✅ 有効：Tシャツ -->
    <button class="btn btn-primary"
            onclick="location.href='tshirt.html'">
      Tシャツ
    </button>

    <button class="btn btn-disabled" disabled>
      靴下・リストバンド（準備中）
    </button>

    <div class="note">
      ※ 現在は Tシャツのみ対応しています
    </div>
  </div>
</body>
</html>
