<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Web AR Demo (Image Overlay)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #camera {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;

      top: 50%;
      left: 50%;
      width: 150px;
      transform: translate(-50%, -50%);
      touch-action: none;
      cursor: move;
      z-index: 10;
      pointer-events: auto;
    }
